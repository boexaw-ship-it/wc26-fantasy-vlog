name: Update FIFA Fantasy Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install scraper browser
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Update cached fantasy data
        run: node scripts/update-fifa-data.js

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update FIFA fantasy data [manual run]"
          file_pattern: public/data/*.json
