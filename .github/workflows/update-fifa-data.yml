name: Update FIFA Fantasy Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install scraper browser
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Update cached fantasy data
        run: node scripts/update-fifa-data.js

      - name: Show generated data
        run: |
          ls -la public/data
          git status --short
          head -40 public/data/last-updated.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          git diff --cached --quiet && echo "No data changes to commit" || git commit -m "chore: update FIFA fantasy data"
          git push
